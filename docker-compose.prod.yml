services:
  postgres:
    image: postgres:16-alpine
    networks:
      cook-us-app:
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    networks:
      cook-us-app:
    environment:
      - FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      cook-us-app:
    environment:
      - APP_PORT=${BACKEND_CONTAINER_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_HOST_PORT}"
    volumes:
      - ./nginx/nginx.conf.prod.template:/etc/nginx/templates/nginx.conf.template
    depends_on:
      - frontend
      - backend
    networks:
      cook-us-app:
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT}
      - NGINX_HOST_PORT=${NGINX_HOST_PORT}
    command: /bin/sh -c "envsubst '$$SERVER_NAME $$FRONTEND_CONTAINER_PORT $$BACKEND_CONTAINER_PORT $$NGINX_HOST_PORT' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

networks:
  cook-us-app:
    driver: bridge
