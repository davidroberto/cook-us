name: CD

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  e2e-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    env:
      SERVER_NAME: ci.local
      FRONTEND_CONTAINER_PORT: 5173
      BACKEND_CONTAINER_PORT: 3000
      NGINX_HOST_PORT: 80
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      POSTGRES_HOST_PORT: 5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Create .env.prod for docker-compose
        run: |
          cat > "$GITHUB_WORKSPACE/.env.prod" <<EOF
          SERVER_NAME=${{ env.SERVER_NAME }}
          FRONTEND_CONTAINER_PORT=${{ env.FRONTEND_CONTAINER_PORT }}
          BACKEND_CONTAINER_PORT=${{ env.BACKEND_CONTAINER_PORT }}
          NGINX_HOST_PORT=${{ env.NGINX_HOST_PORT }}
          POSTGRES_HOST=${{ env.POSTGRES_HOST }}
          POSTGRES_PORT=${{ env.POSTGRES_PORT }}
          POSTGRES_USER=${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ env.POSTGRES_DB }}
          POSTGRES_HOST_PORT=${{ env.POSTGRES_HOST_PORT }}
          EOF

      - run: npm run test:e2e
        timeout-minutes: 10

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, e2e-checks]
    strategy:
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: 'docker-compose.prod.yml,nginx/'
          target: /var/www/cook-us/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_TAG,GITHUB_REPOSITORY
          script: |
            cd /var/www/cook-us
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull frontend backend
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
