services:
  postgres:
    image: postgres:16-alpine
    networks:
      cook-us-app:
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    networks:
      cook-us-app:
    volumes:
      - ./frontend:/app
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      cook-us-app:
    volumes:
      - ./backend:/app
      - /app/dist
    environment:
      - APP_PORT=${BACKEND_CONTAINER_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_HOST_PORT}"
    volumes:
      - ./nginx/nginx.conf.dev.template:/etc/nginx/templates/nginx.conf.template
    depends_on:
      - frontend
      - backend
    networks:
      cook-us-app:
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT}
      - NGINX_HOST_PORT=${NGINX_HOST_PORT}
    command: /bin/sh -c "envsubst '$$SERVER_NAME $$FRONTEND_CONTAINER_PORT $$BACKEND_CONTAINER_PORT $$NGINX_HOST_PORT' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

networks:
  cook-us-app:
    driver: bridge

volumes:
  postgres_data_dev:
